baseURL = 'https://eurusdev.me'
languageCode = 'vi-vn'
title = 'EurusDevSec'
theme = 'PaperMod'
paginate = 5 # Số bài viết hiển thị trên 1 trang

[params]
  defaultTheme = "auto" # Tự động đổi nền Dark/Light theo máy người dùng
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true # Thêm nút Copy ở các đoạn Code
  comments = true # Bật bình luận
  
  # Cấu hình Utterances cho bình luận
  [params.utterances]
    enabled = true
    repo = "eurusdevsec/eurusdevsec.github.io" # Thay bằng username/repo của bạn
    issueTerm = "pathname"
    label = "comments"
    theme = "preferred-color-scheme"
  
  # Cấu hình hiển thị lượt xem
  [params.viewCounter]
    enabled = true
  
  # Cấu hình Newsletter subscription
  [params.newsletter]
    enabled = true
    # Dùng Mailchimp: Lấy form action từ Mailchimp form embed code
    # Link: https://mailchimp.com → Audience → Signup forms → Embedded forms
    mailchimpFormAction = "" # Thay bằng form action URL của Mailchimp
    mailchimpListId = "b_1234567890" # ID từ Mailchimp hidden input
    # Hoặc dùng form service khác
    formAction = "https://formspree.io/f/meevrjll" # Alternative: Formspree
    
    [params.assets]
    favicon = "/favicon.png"
    favicon16x16 = "/favicon.png"
    favicon32x32 = "/favicon.png"
    apple_touch_icon = "/favicon.png"
  


  # CẤU HÌNH TRANG CHỦ DẠNG DASHBOARD KÈM LỜI CHÀO
  [params.homeInfoParams]
    Title = "Hi there 👋 Mình là EurusDevSec"
    Content = "Chào những ai quan tâm đến công nghệ, đời sống và hành trình phát triển bản thân.\n\nĐây là nơi tôi chia sẻ kiến thức về **DevSecOps**, Cybersecurity và tự động hoá hệ thống. Let's Dive deep in!"

  # ICON MẠNG XÃ HỘI Ở TRANG CHỦ
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/eurusdevsec"
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/eurusdevsec"
  [[params.socialIcons]]
    name = "facebook" # Hoặc twitter, discord, v.v.
    url = "https://facebook.com"

# MENU ĐIỀU HƯỚNG TRÊN CÙNG
[[menu.main]]
  identifier = "archives"
  name = "Lưu trữ"
  url = "/archives/"
  weight = 10
[[menu.main]]
  identifier = "categories"
  name = "Chuyên mục"
  url = "/categories/"
  weight = 20
[[menu.main]]
  identifier = "search"
  name = "Tìm kiếm 🔍"
  url = "/search/"
  weight = 30